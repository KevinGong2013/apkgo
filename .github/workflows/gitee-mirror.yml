name: gitee-mirror

# Push every commit and tag to the Gitee mirror so users in China can
# clone/install without going through GitHub. Failure here doesn't
# affect anything else — the GitHub repo is already authoritative, and
# a Gitee outage just means the mirror is one push behind until the
# next run.

on:
  push:
    branches: ["**"]
    tags: ["**"]
  workflow_dispatch:

# checkout reads the repo via GITHUB_TOKEN; the actual push uses GITEE_TOKEN.
permissions:
  contents: read

concurrency:
  group: gitee-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ForTheDream
          GITEE_REPO: apkgo
        run: |
          set -eo pipefail
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN secret not set; skipping mirror push."
            exit 0
          fi
          # OAuth-style URL: token used as the password, username can be
          # any non-empty string. Avoids exposing the token in the local
          # remote URL on the runner's reflog.
          #
          # Not --mirror: that would also push the runner's refs/remotes/*
          # tracking refs, which Gitee rejects as hidden refs ("deny
          # updating a hidden ref") and made every run report failure even
          # after the branches and tags had landed. Map the remote-tracking
          # refs to real branches and push tags as-is; drop the origin/HEAD
          # symref first so it doesn't become a branch literally named HEAD.
          git remote set-head origin -d
          git push --force \
            "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git" \
            'refs/remotes/origin/*:refs/heads/*' 'refs/tags/*:refs/tags/*'
