name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.22"
          cache: true
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: KevinGong2013
          password: ${{ secrets.GH_PAT }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      # Mirror the release to Gitee so installs from China don't have to
      # go through the (often unreachable) GitHub release-asset CDN.
      # Failure here doesn't fail the workflow — the GitHub release is
      # already published by the previous step, so a Gitee outage just
      # means the mirror is one tag behind until the next release.
      - name: Mirror release to Gitee
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ForTheDream
          GITEE_REPO: apkgo
          TAG: ${{ github.ref_name }}
        run: |
          set -eo pipefail
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN secret not set; skipping Gitee mirror."
            exit 0
          fi
          # Use the goreleaser-generated release notes from dist/ if present
          BODY="$(cat dist/CHANGELOG.md 2>/dev/null || echo "")"
          BODY="${BODY:-Release ${TAG}. See https://github.com/KevinGong2013/apkgo/releases/tag/${TAG} for full notes.}"

          REL_ID=$(curl -fsS -X POST \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
            -H "Content-Type: application/json;charset=UTF-8" \
            -d "$(jq -nc \
              --arg t "$TAG" \
              --arg n "$TAG" \
              --arg b "$BODY" \
              --arg c main \
              --arg tk "$GITEE_TOKEN" \
              '{access_token:$tk, tag_name:$t, name:$n, body:$b, target_commitish:$c}')" \
            | jq -r '.id')
          if [ -z "$REL_ID" ] || [ "$REL_ID" = "null" ]; then
            echo "Failed to create Gitee release"
            exit 1
          fi
          echo "Created Gitee release id=$REL_ID"

          uploaded=0
          for f in dist/apkgo_*.tar.gz dist/apkgo_*.zip dist/checksums.txt; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")..."
            curl -fsS -X POST \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${REL_ID}/attach_files?access_token=${GITEE_TOKEN}" \
              -F "file=@${f}" > /dev/null
            uploaded=$((uploaded + 1))
          done
          echo "Mirrored ${uploaded} asset(s) to https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}/releases/tag/${TAG}"
