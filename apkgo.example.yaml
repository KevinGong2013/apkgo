# apkgo configuration example
# Copy this file to apkgo.yaml and fill in your credentials.
# All sections are optional — only configure the stores you need.

# Hooks (optional): shell commands executed before/after uploads.
# Scripts receive JSON context on stdin; see README for schemas.
# hooks:
#   before: "./scripts/validate.sh"
#   after: "./scripts/notify.sh"

stores:
  huawei:
    client_id: ""
    client_secret: ""
    # app_id is optional; auto-detected from package name if omitted
    # app_id: ""
    # Per-store hooks (optional):
    # before: "./scripts/before-huawei.sh"
    # after: "./scripts/after-huawei.sh"

  xiaomi:
    email: ""
    private_key: ""

  oppo:
    client_id: ""
    client_secret: ""

  vivo:
    access_key: ""
    access_secret: ""

  honor:
    client_id: ""
    client_secret: ""
    app_id: ""

  tencent:
    user_id: ""
    access_secret: ""
    app_id: ""
    package_name: ""

  # Script store: run any shell command or script.
  # Receives APK metadata as JSON on stdin; exit 0 = success.
  # script:
  #   command: "./deploy.sh"

  # Multiple script instances via "script.<name>" prefix:
  # script.cdn-upload:
  #   command: "./upload-cdn.sh"
  # script.dingtalk:
  #   command: "./notify-dingtalk.sh"
