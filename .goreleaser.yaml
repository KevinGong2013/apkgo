version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/KevinGong2013/apkgo/cmd.Version={{ .Version }} -X github.com/KevinGong2013/apkgo/cmd.Commit={{ .Commit }} -X github.com/KevinGong2013/apkgo/cmd.Date={{ .Date }} -X github.com/KevinGong2013/apkgo/cmd.BuiltBy=goreleaser

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - image_templates:
      - "ghcr.io/kevingong2013/apkgo:{{ .Tag }}"
      - "ghcr.io/kevingong2013/apkgo:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
    goarch: amd64

