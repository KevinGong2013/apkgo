version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/KevinGong2013/apkgo/cmd.Version={{ .Version }} -X github.com/KevinGong2013/apkgo/cmd.Commit={{ .Commit }} -X github.com/KevinGong2013/apkgo/cmd.Date={{ .Date }} -X github.com/KevinGong2013/apkgo/cmd.BuiltBy=goreleaser

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - image_templates:
      - "ghcr.io/kevingong2013/apkgo:{{ .Tag }}"
      - "ghcr.io/kevingong2013/apkgo:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "ghcr.io/kevingong2013/apkgo:{{ .Tag }}-arm64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
    goarch: arm64

brews:
  - name: apkgo
    homepage: https://github.com/KevinGong2013/apkgo
    description: Upload APK to multiple Android app stores. Designed for CI/CD and AI agents.
    license: "Apache-2.0"
    repository:
      owner: KevinGong2013
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: Kevin.Gong
      email: aoxianglele@cloud.com
    install: |-
      bin.install "apkgo"
